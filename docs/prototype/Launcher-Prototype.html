<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher - 原型预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            z-index: 1000;
        }

        /* 启动器窗口 */
        .launcher-window {
            width: 600px;
            max-height: 600px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        /* 深色主题 */
        .launcher-window.dark {
            background: #2b2b2b;
        }

        /* 顶部区域 */
        .header {
            padding: 25px 25px 15px 25px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 25px;
            padding: 12px 20px;
            transition: all 0.2s ease;
        }

        .launcher-window.dark .search-container {
            background: #3a3a3a;
        }

        .search-container:focus-within {
            background: #e8e8e8;
            box-shadow: 0 0 0 2px #0078d4;
        }

        .launcher-window.dark .search-container:focus-within {
            background: #4a4a4a;
        }

        .search-icon {
            font-size: 18px;
            margin-right: 12px;
            opacity: 0.6;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            font-size: 16px;
            color: #333;
        }

        .launcher-window.dark .search-input {
            color: #fff;
        }

        .search-input:focus {
            outline: none;
        }

        .search-input::placeholder {
            color: #999;
        }

        .clear-btn {
            background: #c0c0c0;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .launcher-window.dark .clear-btn {
            background: #505050;
        }

        .clear-btn.visible {
            opacity: 1;
        }

        .clear-btn:hover {
            background: #b0b0b0;
        }

        /* 过滤器栏 */
        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 25px;
        }

        .filter-chip {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            color: #808080;
        }

        .launcher-window.dark .filter-chip {
            border-color: #404040;
            background: #2b2b2b;
            color: #808080;
        }

        .filter-chip:hover {
            background: #f5f5f5;
        }

        .launcher-window.dark .filter-chip:hover {
            background: #3a3a3a;
        }

        .filter-chip.active {
            background: #0078d4;
            color: white;
            border-color: #0078d4;
        }

        /* 结果列表 */
        .results-container {
            max-height: 400px;
            overflow-y: auto;
            padding: 0 15px 15px 15px;
        }

        .results-container::-webkit-scrollbar {
            width: 8px;
        }

        .results-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-container::-webkit-scrollbar-thumb {
            background: #e0e0e0;
            border-radius: 4px;
        }

        .launcher-window.dark .results-container::-webkit-scrollbar-thumb {
            background: #404040;
        }

        /* 分类标题 */
        .category-header {
            padding: 10px 10px 5px 10px;
            font-size: 12px;
            color: #808080;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 结果项 */
        .result-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            margin: 2px 0;
        }

        .result-item:hover {
            background: #f5f5f5;
        }

        .launcher-window.dark .result-item:hover {
            background: #3a3a3a;
        }

        .result-item.selected {
            background: #f0f0f0;
            border: 1px solid #0078d4;
        }

        .launcher-window.dark .result-item.selected {
            background: #404040;
        }

        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #e0e0e0;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .result-content {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 3px;
        }

        .launcher-window.dark .result-title {
            color: #fff;
        }

        .result-title.highlight {
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-subtitle {
            font-size: 12px;
            color: #808080;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-details {
            margin-left: 8px;
            background: #3a3a3a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #808080;
        }

        .launcher-window.dark .result-details {
            background: #505050;
            color: #c0c0c0;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #808080;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* 提示区域 */
        .hint-area {
            padding: 20px;
            text-align: center;
            color: #808080;
        }

        /* 搜索状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: #0078d4;
            color: white;
            margin-left: 8px;
        }

        /* 边框高亮（第一项） */
        .result-item:first-child {
            border: 1px solid transparent;
        }

        .result-item:first-child.keyboard-focus {
            border-color: #0078d4;
            background: #f0f0f0;
        }

        .launcher-window.dark .result-item:first-child.keyboard-focus {
            background: #404040;
        }

        /* 快捷键提示 */
        .shortcut-hint {
            display: flex;
            gap: 8px;
            padding: 12px 25px 25px 25px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #808080;
        }

        .launcher-window.dark .shortcut-hint {
            border-color: #404040;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shortcut-key {
            background: #e0e0e0;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
        }

        .launcher-window.dark .shortcut-key {
            background: #404040;
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()">🌓 切换主题</button>

    <!-- 启动器窗口 -->
    <div class="launcher-window" id="launcher">
        <!-- 顶部搜索区域 -->
        <div class="header">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索应用或文件..." oninput="handleInput()">
                <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
            </div>
        </div>

        <!-- 过滤器栏 -->
        <div class="filter-bar">
            <div class="filter-chip active" onclick="setFilter('all', this)">全部</div>
            <div class="filter-chip" onclick="setFilter('app', this)">应用</div>
            <div class="filter-chip" onclick="setFilter('file', this)">文件</div>
        </div>

        <!-- 结果列表 -->
        <div class="results-container" id="resultsContainer">
            <!-- 默认显示提示 -->
            <div class="hint-area">
                <p>输入应用名称或文件名进行搜索</p>
                <p style="margin-top: 8px; font-size: 12px;">支持中文和拼音搜索</p>
            </div>
        </div>

        <!-- 快捷键提示 -->
        <div class="shortcut-hint">
            <div class="shortcut-item"><span class="shortcut-key">↑↓</span> 选择</div>
            <div class="shortcut-item"><span class="shortcut-key">Enter</span> 打开</div>
            <div class="shortcut-item"><span class="shortcut-key">Esc</span> 关闭</div>
        </div>
    </div>

    <script>
        // 示例数据
        const applications = [
            { id: 'wechat', name: '微信', nameEn: 'WeChat', category: '通讯', icon: '💬', pinyin: 'wx' },
            { id: 'qq', name: 'QQ', nameEn: 'QQ', category: '通讯', icon: '🐧', pinyin: 'qq' },
            { id: 'chrome', name: 'Chrome', nameEn: 'Chrome', category: '网络', icon: '🌐', pinyin: 'chrome' },
            { id: 'vscode', name: 'Visual Studio Code', nameEn: 'VSCode', category: '开发', icon: '💻', pinyin: 'vscode' },
            { id: 'firefox', name: 'Firefox', nameEn: 'Firefox', category: '网络', icon: '🦊', pinyin: 'firefox' },
            { id: 'deepin-music', name: '深度音乐', nameEn: 'Deepin Music', category: '影音', icon: '🎵', pinyin: 'deepinyinyue' },
            { id: 'deepin-terminal', name: '深度终端', nameEn: 'Deepin Terminal', category: '系统', icon: '🖥️', pinyin: 'deepinzhongduan' },
            { id: 'file-manager', name: '文件管理器', nameEn: 'File Manager', category: '系统', icon: '📁', pinyin: 'wenjianguanliqi' },
        ];

        const files = [
            { id: 'doc1', name: '工作计划.pdf', path: '/home/user/Documents/工作计划.pdf', type: 'document', size: '2.3 MB' },
            { id: 'doc2', name: '项目报告.docx', path: '/home/user/Documents/项目报告.docx', type: 'document', size: '1.5 MB' },
            { id: 'img1', name: '截图_20240401.png', path: '/home/user/Pictures/截图_20240401.png', type: 'image', size: '856 KB' },
            { id: 'img2', name: '壁纸.jpg', path: '/home/user/Pictures/壁纸.jpg', type: 'image', size: '4.2 MB' },
            { id: 'video1', name: '教程视频.mp4', path: '/home/user/Videos/教程视频.mp4', type: 'video', size: '156 MB' },
            { id: 'music1', name: '背景音乐.mp3', path: '/home/user/Music/背景音乐.mp3', type: 'music', size: '4.5 MB' },
            { id: 'code1', name: 'main.cpp', path: '/home/user/Projects/main.cpp', type: 'document', size: '12 KB' },
            { id: 'xls1', name: '数据表.xlsx', path: '/home/user/Documents/数据表.xlsx', type: 'document', size: '89 KB' },
        ];

        let currentQuery = '';
        let currentFilter = 'all';
        let selectedIndex = -1;

        function handleInput() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            currentQuery = input.value.trim();

            // 显示/隐藏清除按钮
            clearBtn.classList.toggle('visible', currentQuery.length > 0);

            if (currentQuery.length === 0) {
                showHint();
                return;
            }

            // 模拟搜索延迟
            setTimeout(() => {
                performSearch();
            }, 100);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            handleInput();
            document.getElementById('searchInput').focus();
        }

        function showHint() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="hint-area">
                    <p>输入应用名称或文件名进行搜索</p>
                    <p style="margin-top: 8px; font-size: 12px;">支持中文和拼音搜索</p>
                </div>
            `;
            selectedIndex = -1;
        }

        function performSearch() {
            const container = document.getElementById('resultsContainer');
            const query = currentQuery.toLowerCase();

            if (query === '') {
                showHint();
                return;
            }

            // 搜索应用
            const matchedApps = applications.filter(app =>
                app.name.toLowerCase().includes(query) ||
                app.nameEn.toLowerCase().includes(query) ||
                app.pinyin.includes(query) ||
                query.includes(app.pinyin)
            );

            // 搜索文件
            const matchedFiles = files.filter(file =>
                file.name.toLowerCase().includes(query)
            );

            if (matchedApps.length === 0 && matchedFiles.length === 0) {
                showEmpty(query);
                return;
            }

            let html = '';
            const maxResults = 8;
            let currentIndex = 0;

            // 显示应用
            if (currentFilter === 'all' || currentFilter === 'app') {
                if (matchedApps.length > 0) {
                    html += `<div class="category-header">应用 (${matchedApps.length})</div>`;
                    for (let i = 0; i < matchedApps.length && currentIndex < maxResults; i++, currentIndex++) {
                        html += renderAppResult(matchedApps[i], currentIndex);
                    }
                }
            }

            // 显示文件
            if (currentFilter === 'all' || currentFilter === 'file') {
                if (matchedFiles.length > 0) {
                    html += `<div class="category-header">文件 (${matchedFiles.length})</div>`;
                    for (let i = 0; i < matchedFiles.length && currentIndex < maxResults; i++, currentIndex++) {
                        html += renderFileResult(matchedFiles[i], currentIndex);
                    }
                }
            }

            container.innerHTML = html;

            // 自动选择第一项
            if (query.length > 0) {
                selectItem(0);
            }
        }

        function renderAppResult(app, index) {
            const highlight = (text) => {
                if (!currentQuery) return text;
                const regex = new RegExp(`(${currentQuery})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            };

            return `
                <div class="result-item" data-index="${index}" onclick="openItem(${index})">
                    <div class="result-icon">${app.icon}</div>
                    <div class="result-content">
                        <div class="result-title">${highlight(app.name)}</div>
                        <div class="result-subtitle">
                            <span>${app.category}</span>
                            <span>•</span>
                            <span>${app.nameEn}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFileResult(file, index) {
            const icon = {
                'document': '📄',
                'image': '🖼️',
                'video': '🎬',
                'music': '🎵'
            }[file.type] || '📁';

            return `
                <div class="result-item" data-index="${index}" onclick="openItem(${index})">
                    <div class="result-icon">${icon}</div>
                    <div class="result-content">
                        <div class="result-title">${file.name}</div>
                        <div class="result-subtitle">
                            <span>${file.path}</span>
                        </div>
                    </div>
                    <div class="result-details">${file.size}</div>
                </div>
            `;
        }

        function showEmpty(query) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <div class="empty-text">未找到与"${query}"相关的内容</div>
                </div>
            `;
        }

        function selectItem(index) {
            const items = document.querySelectorAll('.result-item');
            items.forEach(item => item.classList.remove('selected', 'keyboard-focus'));

            if (items.length > 0 && index >= 0) {
                selectedIndex = index;
                items[index].classList.add('selected');
            }
        }

        function openItem(index) {
            console.log('打开项目:', index);
            // 这里可以添加打开逻辑
            selectItem(index);
        }

        function setFilter(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            performSearch();
        }

        function toggleTheme() {
            const launcher = document.getElementById('launcher');
            launcher.classList.toggle('dark');
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.result-item');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (items.length > 0) {
                    selectItem(selectedIndex + 1 < items.length ? selectedIndex + 1 : 0);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (items.length > 0) {
                    selectItem(selectedIndex - 1 >= 0 ? selectedIndex - 1 : items.length - 1);
                }
            } else if (e.key === 'Enter' && items.length > 0) {
                e.preventDefault();
                openItem(selectedIndex);
            }
        });

        // 自动聚焦搜索框
        document.getElementById('searchInput').focus();
    </script>
</body>
</html>
