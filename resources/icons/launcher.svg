<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <!-- 内部光晕 -->
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1D4ED8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 内部光晕层 -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#glow)"/>

  <!-- 放大镜圆圈 -->
  <circle cx="26" cy="26" r="11" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.95"/>

  <!-- 放大镜手柄 -->
  <line x1="34" y1="34" x2="46" y2="46" stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- 高光点 -->
  <circle cx="20" cy="20" r="2" fill="white" fill-opacity="0.6"/>
</svg>
